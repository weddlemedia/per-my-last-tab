<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>
  <link rel="stylesheet" href="newtab.css">
</head>
<body>
  <main>
    <div id="clock"></div>
    <div id="date"></div>
    <blockquote id="quote-text"></blockquote>

    <form id="search-form" autocomplete="off">
      <input id="search-input" type="text" placeholder="Search Google or type a URL" autofocus>
    </form>

    <nav id="top-sites"></nav>
    <footer>Per My Last Tab &mdash; Inspiration for the already uninspired.</footer>
  </main>

  <div id="footer-tip" class="hidden">
    <button id="footer-tip-close" type="button" aria-label="Close">&times;</button>
    <p><strong>Seeing a banner at the bottom?</strong></p>
    <p>That's Chrome's footer, not ours. Right-click it and select "Hide Footer on New Tab Page" to remove it.</p>
  </div>

  <script src="quotes.js"></script>
  <script src="newtab.js"></script>
</body>
</html>
